<!doctype html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>404 • rblxexec</title>
      <link rel="icon" href="/favicon.svg">
      <link rel="stylesheet" href="/assets/index.css">
      <style>
         html,
         body{
         margin:0;
         width:100%;
         height:100%;
         overflow:hidden;
         font-family:"SF Pro Display",sans-serif;
         background:#06070c;
         color:#fff;
         }
         body{
         display:flex;
         justify-content:center;
         align-items:center;
         position:relative;
         }
         /* background */
         body::before{
         content:"";
         position:absolute;
         inset:0;
         background:
         radial-gradient(circle at 50% 20%,rgba(58,87,255,.22),transparent 45%),
         radial-gradient(circle at 80% 80%,rgba(26,64,255,.15),transparent 40%),
         radial-gradient(circle at 20% 90%,rgba(42,42,255,.12),transparent 35%);
         animation:float 14s ease-in-out infinite;
         }
         body::after{
         content:"";
         position:absolute;
         inset:0;
         background-image:
         linear-gradient(rgba(61,92,255,.06) 1px,transparent 1px),
         linear-gradient(90deg,rgba(61,92,255,.06) 1px,transparent 1px);
         background-size:90px 90px;
         opacity:.18;
         mask-image:radial-gradient(circle,#000 30%,transparent 100%);
         }
         @keyframes float{
         0%,100%{
         transform:translateY(0px);
         }
         50%{
         transform:translateY(-35px);
         }
         }
         .card{
         position:relative;
         z-index:2;
         width:min(560px,90vw);
         padding:55px;
         border-radius:30px;
         background:rgba(20,20,28,.72);
         backdrop-filter:blur(18px);
         border:1px solid rgba(255,255,255,.08);
         box-shadow:
         0 0 0 1px rgba(255,255,255,.02),
         0 30px 80px rgba(0,0,0,.6);
         text-align:center;
         animation:show .8s cubic-bezier(.2,.8,.2,1);
         }
         @keyframes show{
         from{
         opacity:0;
         transform:translateY(25px) scale(.97);
         }
         to{
         opacity:1;
         transform:none;
         }
         }
         .logo{
         display:inline-flex;
         align-items:center;
         gap:12px;
         margin-bottom:28px;
         font-size:18px;
         font-weight:600;
         }
         .logo-dot{
         width:42px;
         height:42px;
         border-radius:50%;
         background:linear-gradient(135deg,#2446ff,#16218c);
         display:flex;
         align-items:center;
         justify-content:center;
         box-shadow:0 0 35px rgba(60,90,255,.45);
         font-size:15px;
         }
         .code{
         font-size:110px;
         font-weight:700;
         letter-spacing:-4px;
         line-height:1;
         margin-bottom:10px;
         background:linear-gradient(#fff,#cfd6ff);
         -webkit-background-clip:text;
         -webkit-text-fill-color:transparent;
         }
         .title{
         font-size:30px;
         font-weight:600;
         margin-bottom:14px;
         }
         .desc{
         max-width:420px;
         margin:auto;
         color:rgba(255,255,255,.58);
         line-height:1.7;
         font-size:17px;
         }
         .buttons{
         margin-top:42px;
         display:flex;
         justify-content:center;
         gap:15px;
         flex-wrap:wrap;
         }
         .button{
         padding:15px 28px;
         border-radius:18px;
         text-decoration:none;
         font-weight:600;
         transition:.25s;
         border:1px solid rgba(255,255,255,.08);
         }
         .primary{
         background:linear-gradient(180deg,#314eff,#2338b8);
         color:#fff;
         box-shadow:0 10px 30px rgba(50,80,255,.35);
         }
         .primary:hover{
         transform:translateY(-3px);
         box-shadow:0 15px 40px rgba(50,80,255,.45);
         }
         .secondary{
         background:rgba(255,255,255,.03);
         color:#cfd3ff;
         }
         .secondary:hover{
         background:rgba(255,255,255,.06);
         transform:translateY(-3px);
         }
         .footer{
         margin-top:40px;
         font-size:13px;
         color:rgba(255,255,255,.28);
         letter-spacing:.4px;
         }
      </style>
   </head>
   <body>
      <div class="card">
         <div class="logo">
            <div class="logo-dot">rx</div>
            <span>rblxexec</span>
         </div>
         <div class="code">404</div>
         <div class="title">
            Page not found
         </div>
         <div class="desc">
            The page you requested doesn't exist, may have been moved,
            or is currently unavailable.
         </div>
         <div class="buttons">
            <a href="/" class="button primary">
            ← Return Home
            </a>
         </div>
         <div class="footer">
            ERR_PAGE_NOT_FOUND
         </div>
      </div>
   </body>
</html>
